<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cash Point App</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f4f6f9;
      color: #222;
    }

    .container {
      max-width: 500px;
      margin: 20px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #0a7b61;
    }

    .balance {
      text-align: center;
      background: #0a7b61;
      color: white;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .balance h2 {
      margin: 0;
      font-size: 16px;
      font-weight: normal;
    }

    .balance p {
      margin: 8px 0 0;
      font-size: 28px;
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      background: #0a7b61;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.95;
    }

    .history {
      margin-top: 25px;
    }

    .history h3 {
      margin-bottom: 12px;
    }

    .transaction {
      background: #f7f7f7;
      border-left: 5px solid #0a7b61;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .transaction.retrait {
      border-left-color: #d9534f;
    }

    .small {
      color: #777;
      font-size: 13px;
      margin-top: 4px;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 10px;
    }

    .actions {
      margin-top: 15px;
    }

    .danger {
      background: #d9534f;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cash Point</h1>

    <div class="balance">
      <h2>Solde actuel</h2>
      <p id="balance">0 Ar</p>
    </div>

    <div class="form-group">
      <label for="clientName">Nom du client</label>
      <input type="text" id="clientName" placeholder="Ex: Rakoto" />
    </div>

    <div class="form-group">
      <label for="type">Type de transaction</label>
      <select id="type">
        <option value="depot">Dépôt</option>
        <option value="retrait">Retrait</option>
      </select>
    </div>

    <div class="form-group">
      <label for="amount">Montant (Ar)</label>
      <input type="number" id="amount" placeholder="Ex: 10000" />
    </div>

    <button onclick="addTransaction()">Enregistrer</button>

    <div class="actions">
      <button class="danger" onclick="clearData()">Effacer toutes les données</button>
    </div>

    <div class="history">
      <h3>Historique</h3>
      <div id="history"></div>
    </div>
  </div>

  <script>
    let balance = localStorage.getItem("cash_balance")
      ? parseInt(localStorage.getItem("cash_balance"))
      : 0;

    let transactions = localStorage.getItem("cash_transactions")
      ? JSON.parse(localStorage.getItem("cash_transactions"))
      : [];

    function formatAr(value) {
      return value.toLocaleString("fr-FR") + " Ar";
    }

    function saveData() {
      localStorage.setItem("cash_balance", balance);
      localStorage.setItem("cash_transactions", JSON.stringify(transactions));
    }

    function updateUI() {
      document.getElementById("balance").innerText = formatAr(balance);

      const historyDiv = document.getElementById("history");
      historyDiv.innerHTML = "";

      if (transactions.length === 0) {
        historyDiv.innerHTML = '<div class="empty">Tsy mbola misy transaction</div>';
        return;
      }

      transactions.slice().reverse().forEach((tx) => {
        const div = document.createElement("div");
        div.className = "transaction " + tx.type;

        div.innerHTML = `
          <strong>${tx.type === "depot" ? "Dépôt" : "Retrait"} - ${formatAr(tx.amount)}</strong>
          <div>${tx.client}</div>
          <div class="small">${tx.date}</div>
        `;

        historyDiv.appendChild(div);
      });
    }

    function addTransaction() {
      const client = document.getElementById("clientName").value.trim();
      const type = document.getElementById("type").value;
      const amount = parseInt(document.getElementById("amount").value);

      if (!client) {
        alert("Ampidiro ny anaran'ny client.");
        return;
      }

      if (!amount || amount <= 0) {
        alert("Ampidiro tsara ny montant.");
        return;
      }

      if (type === "retrait" && amount > balance) {
        alert("Tsy ampy ny solde.");
        return;
      }

      if (type === "depot") {
        balance += amount;
      } else {
        balance -= amount;
      }

      const tx = {
        client: client,
        type: type,
        amount: amount,
        date: new Date().toLocaleString("fr-FR")
      };

      transactions.push(tx);
      saveData();
      updateUI();

      document.getElementById("clientName").value = "";
      document.getElementById("amount").value = "";
    }

    function clearData() {
      const confirmDelete = confirm("Tena hofafana daholo ve ny données?");
      if (!confirmDelete) return;

      balance = 0;
      transactions = [];
      saveData();
      updateUI();
    }

    updateUI();
  </script>
</body>
</html>
